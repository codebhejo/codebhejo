<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- =============================================
         DYNAMIC CANONICAL — updates on every route change.
         Works with React Router / history API SPAs.
         ============================================= -->
    <link id="canonical-tag" rel="canonical" href="https://codebhejo.in/" />
    <script>
      (function () {
        function setCanonical() {
          var tag = document.getElementById("canonical-tag");
          if (tag) {
            tag.setAttribute(
              "href",
              "https://codebhejo.in" + window.location.pathname
            );
          }
        }
        setCanonical();
        // patch pushState & replaceState so SPA route changes update canonical
        ["pushState", "replaceState"].forEach(function (fn) {
          var orig = history[fn];
          history[fn] = function () {
            orig.apply(this, arguments);
            setCanonical();
          };
        });
        window.addEventListener("popstate", setCanonical);
      })();
    </script>
