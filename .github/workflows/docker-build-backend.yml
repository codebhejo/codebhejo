name: Build & Push Backend Image

on:
  push:
    branches:
      - main
    paths:
      - "apps/backend/**"
      - "infra/Dockerfile"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      CI_REGISTRY: ${{ secrets.CI_REGISTRY }}
      CI_USERNAME: ${{ secrets.CI_USERNAME }}
      CI_PASSWORD: ${{ secrets.CI_PASSWORD }}
      IMAGE_NAME: 9ovind/codebhejo
      TAG: ${{ github.ref_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Container Registry
        run: |
          echo "$CI_PASSWORD" | docker login $CI_REGISTRY \
            -u $CI_USERNAME \
            --password-stdin

      - name: Build backend image
        run: |
          docker build \
            --target backend \
            -f infra/Dockerfile \
            -t $CI_REGISTRY/$IMAGE_NAME:$TAG-backend \
            .

      - name: Push backend image
        run: docker push $CI_REGISTRY/$IMAGE_NAME:$TAG-backend

      - name: Update image tag in k8s manifest
        run: |
          sed -i "s|image: .*/backend:.*|image: $CI_REGISTRY/$IMAGE_NAME:$TAG-backend|" infra/k8s/api.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add infra/k8s/api.yaml
          git commit -m "ci: update backend image to $TAG-backend [skip ci]"
          git push
