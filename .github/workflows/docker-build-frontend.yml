name: Build & Push Frontend Image

on:
  push:
    branches:
      - main
    paths:
      - "apps/frontend/**"
      - "apps/cli/**"
      - "infra/Dockerfile"
      - "infra/nginx.conf"
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (defaults to branch name)"
        required: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      CI_REGISTRY: ${{ secrets.CI_REGISTRY }}
      CI_USERNAME: ${{ secrets.CI_USERNAME }}
      CI_PASSWORD: ${{ secrets.CI_PASSWORD }}
      IMAGE_NAME: 9ovind/codebhejo
      TAG: ${{ inputs.tag || github.ref_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Container Registry
        run: |
          echo "$CI_PASSWORD" | docker login $CI_REGISTRY \
            -u $CI_USERNAME \
            --password-stdin

      - name: Build frontend image
        run: |
          docker build \
            --target frontend \
            -f infra/Dockerfile \
            -t $CI_REGISTRY/$IMAGE_NAME:$TAG-frontend \
            .

      - name: Push frontend image
        run: docker push $CI_REGISTRY/$IMAGE_NAME:$TAG-frontend

      - name: Update image tag in k8s manifest
        run: |
          IMAGE="$CI_REGISTRY/$IMAGE_NAME:$TAG-frontend" \
          yq -i '(select(.kind == "Deployment").spec.template.spec.containers[0].image) = strenv(IMAGE)' infra/k8s/web.yaml
          git diff --quiet infra/k8s/web.yaml && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add infra/k8s/web.yaml
          git commit -m "ci: update frontend image to $TAG-frontend [skip ci]"
          git push
